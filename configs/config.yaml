server:
  port: "8080"
  mode: "release"

log:
  level: "info"
  file: ""

lock:
  type: "memory"
  address: ""
  password: ""
  db: 0
  prefix: "astro:"

scheduler:
  max_retries: 3
  retry_interval: 5

node:
  heartbeat_timeout: 30
  check_interval: 10

storage:
  type: "local"
  endpoint: ""
  access_key: ""
  secret_key: ""
  bucket: "astro-data"
  region: "us-east-1"
  use_ssl: false
  base_path: ""

archiver:
  base_path: "./data/archive"
  default_retention_days: 365
  bucket: "astro-data"

notification:
  enabled: false
  channels:
    - "webhook"
  email:
    smtp_host: ""
    smtp_port: 587
    username: ""
    password: ""
    from: ""
    receivers: []
  webhook:
    url: ""
    method: "POST"
    headers: {}
